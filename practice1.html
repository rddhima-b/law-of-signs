    <div class="input">
      <input id="answerInput" type="text" name="username" placeholder="Type your answer here">
      <button onclick="showAnswer()">Answer</button>

<!-- Output area -->
<div id="output"></div>
<button id="next" class="b">
</div>
<script>
function showAnswer() {
    
const input = document.getElementById("answerInput").value.trim();
const output = document.getElementById("output");
const sound = new Audio('audio/correct.mp3');
const correctAnswer = "d";

    if (input == "d") {
        output.textContent = "Your answer: " + input +  " is CORRECT!";
        output.style.color = "green";
        document.getElementById("next").innerHTML = "Next Practice";
        output.getElementById('effect').addEventListener(() => {sound.currentTime = 0; 
            sound.play().catch(err => console.error("Playback failed:", err));});
    } 

    else {
        output.textContent = "WRONG";
        output.style.color = "red";
    }
}
</script>
