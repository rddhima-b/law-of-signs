<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesson 1 - Law of Signs</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="unit-buttons.css">
    <link rel="icon" type="image/x-icon" href="images/icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Chocolate+Classical+Sans&display=swap" rel="stylesheet">
</head>

<body data-letters="a,b,c,d,e">

<header>
  <p class="h1">
    Lesson One: Letters A-E
    <a href="beginning.html" class="icon">
        <img src="images/logo.png" alt="Home" style="width:100px">
    </a>
  </p>
</header>

<h2 id="letterTitle"></h2>

<div class="center">
  <video id="letterVideo" class="center-iframe" controls></video>
</div>

<div class="buttonspacing" id="letterNav"></div>

<div class="center">
  <button onclick="prevLetter()">← Previous</button>
  <button onclick="nextLetter()">Next →</button>
</div>

<script src="app.js"></script>
</body>
</html>
